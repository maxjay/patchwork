<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>patchwork — demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>patchwork</h1>
    <span class="subtitle">copilot-native JSON editing engine</span>
  </header>

  <div class="container">
    <div class="panel editor-panel">
      <div class="editor-toolbar">
        <h2>Editor</h2>
        <div class="toolbar-actions">
          <button id="undo-btn" class="btn btn-small" title="Undo (Ctrl+Z)">Undo</button>
          <button id="redo-btn" class="btn btn-small" title="Redo (Ctrl+Shift+Z)">Redo</button>
        </div>
      </div>
      <div id="editor"></div>
      <div id="add-field-row" class="add-field-row">
        <input id="add-key" class="add-input" placeholder="key" />
        <input id="add-value" class="add-input" placeholder="value" />
        <button id="add-submit" class="btn btn-small">+ Add</button>
      </div>

      <div id="copilot-section">
        <h3>Copilot Proposals</h3>
        <div id="copilot-proposals"><div class="no-ops">No active session</div></div>
        <div id="copilot-bulk" class="copilot-bulk hidden">
          <button id="approve-all" class="btn btn-approve">Approve All</button>
          <button id="decline-all" class="btn btn-decline">Decline All</button>
          <button id="end-session" class="btn btn-small">End Session</button>
        </div>
      </div>
    </div>

    <div class="panel chat-panel">
      <h2>Copilot Chat</h2>
      <details class="provider-settings" open>
        <summary>Provider</summary>
        <div class="provider-fields">
          <select id="provider" class="provider-select">
            <option value="anthropic">Anthropic</option>
            <option value="openai-compat">OpenAI-compatible</option>
          </select>
          <input id="endpoint" class="provider-input" placeholder="Endpoint URL (leave blank for default)" />
          <input id="model-name" class="provider-input" placeholder="Model (leave blank for default)" />
          <input id="api-key" type="password" class="provider-input" placeholder="API key (optional for local)" />
        </div>
      </details>
      <div id="chat-messages" class="chat-messages"></div>
      <div class="chat-input-row">
        <input id="chat-input" class="chat-input" placeholder="Ask the copilot to edit the config..." />
        <button id="chat-send" class="btn btn-small">Send</button>
      </div>
    </div>

    <div class="panel debug-panel">
      <h2>Debug</h2>

      <details open>
        <summary>Base</summary>
        <pre id="debug-base"></pre>
      </details>

      <details open>
        <summary>User Ops</summary>
        <div id="debug-user-ops"></div>
      </details>

      <details open>
        <summary>Copilot Ops</summary>
        <div id="debug-copilot-ops"></div>
      </details>

      <details open>
        <summary>Current State</summary>
        <pre id="debug-current"></pre>
      </details>

      <div class="version" id="debug-version"></div>
    </div>
  </div>

  <script type="module" src="main.ts"></script>
</body>
</html>
